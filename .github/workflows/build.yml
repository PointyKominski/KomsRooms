name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a build manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Copy vendored snapclient binaries into jniLibs ───────────────────
      # Binaries are shipped as .so files in jniLibs so Android installs them
      # to the app's nativeLibraryDir, which is always executable.
      # Putting them in assets and extracting to /data/user/ fails on modern
      # Android because that partition is mounted noexec.
      #
      # Two variants:
      #   libsnapclient.so        — current (updated by sync_snapdroid workflow)
      #   libsnapclient_stable.so — pinned fallback (promoted via promote_stable.sh)
      - name: Copy vendored snapclient binaries to jniLibs
        run: |
          set -e

          CURRENT_VER=$(head -1 vendor/snapclient/VERSION | tr -d '[:space:]')
          STABLE_VER=$(head -1 vendor/snapclient_stable/VERSION 2>/dev/null | tr -d '[:space:]' || echo "none")
          echo "Current version: $CURRENT_VER  |  Stable version: $STABLE_VER"

          for ABI in arm64-v8a armeabi-v7a; do
            mkdir -p "app/src/main/jniLibs/$ABI"

            SRC="vendor/snapclient/snapclient_$ABI"
            if [ ! -f "$SRC" ]; then
              echo "⚠ $SRC not found — run scripts/fetch_snapclient.sh and commit"
              exit 1
            fi
            cp "$SRC" "app/src/main/jniLibs/$ABI/libsnapclient.so"
            echo "✓ libsnapclient.so [$ABI] (current)"

            STABLE_SRC="vendor/snapclient_stable/snapclient_$ABI"
            if [ -f "$STABLE_SRC" ]; then
              cp "$STABLE_SRC" "app/src/main/jniLibs/$ABI/libsnapclient_stable.so"
              echo "✓ libsnapclient_stable.so [$ABI] (stable)"
            else
              cp "$SRC" "app/src/main/jniLibs/$ABI/libsnapclient_stable.so"
              echo "~ libsnapclient_stable.so [$ABI] (copied from current)"
            fi
          done

          # Version text files still go to assets so the app can read them at runtime
          mkdir -p app/src/main/assets
          echo "$CURRENT_VER" > app/src/main/assets/snapclient_version_current.txt
          echo "$STABLE_VER"  > app/src/main/assets/snapclient_version_stable.txt

          echo ""
          ls -lah app/src/main/jniLibs/arm64-v8a/ app/src/main/jniLibs/armeabi-v7a/

      - name: Build APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KomsRooms-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: KomsRooms-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
