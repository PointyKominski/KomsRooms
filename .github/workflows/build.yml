name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a build manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Copy vendored snapclient binaries into assets ─────────────────────
      # Two sets of binaries are bundled:
      #   snapclient_<abi>        — current (updated by sync_snapdroid workflow)
      #   snapclient_stable_<abi> — pinned fallback (promoted manually via promote_stable.sh)
      # The in-app developer panel (7-tap on version label) switches between them.
      - name: Copy vendored snapclient binaries to assets
        run: |
          set -e
          mkdir -p app/src/main/assets

          CURRENT_VER=$(head -1 vendor/snapclient/VERSION | tr -d '[:space:]')
          STABLE_VER=$(head -1 vendor/snapclient_stable/VERSION 2>/dev/null | tr -d '[:space:]' || echo "none")

          echo "Current version: $CURRENT_VER"
          echo "Stable version:  $STABLE_VER"

          # Current binaries
          for ABI in arm64-v8a armeabi-v7a; do
            SRC="vendor/snapclient/snapclient_$ABI"
            if [ -f "$SRC" ]; then
              cp "$SRC" "app/src/main/assets/snapclient_$ABI"
              chmod +x "app/src/main/assets/snapclient_$ABI"
              echo "✓ snapclient_$ABI (current)"
            else
              echo "⚠ $SRC not found — run scripts/fetch_snapclient.sh and commit"
              exit 1
            fi
          done

          # Stable/fallback binaries
          for ABI in arm64-v8a armeabi-v7a; do
            SRC="vendor/snapclient_stable/snapclient_$ABI"
            if [ -f "$SRC" ]; then
              cp "$SRC" "app/src/main/assets/snapclient_stable_$ABI"
              chmod +x "app/src/main/assets/snapclient_stable_$ABI"
              echo "✓ snapclient_stable_$ABI (stable)"
            else
              # Stable is optional — fall back to current if not yet promoted
              cp "app/src/main/assets/snapclient_$ABI" "app/src/main/assets/snapclient_stable_$ABI"
              echo "~ snapclient_stable_$ABI (copied from current — run promote_stable.sh to pin)"
            fi
          done

          # Write small version text files read by the app at runtime
          echo "$CURRENT_VER" > app/src/main/assets/snapclient_version_current.txt
          echo "$STABLE_VER"  > app/src/main/assets/snapclient_version_stable.txt

          echo ""
          ls -lah app/src/main/assets/

      - name: Build debug APK
        run: bash gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KomsRooms-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        run: bash gradlew assembleRelease --stacktrace

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KomsRooms-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
